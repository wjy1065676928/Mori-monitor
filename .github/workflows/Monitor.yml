name: youtube-monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MAIL_USER: ${{ secrets.MAIL_USER }}
      MAIL_PASS: ${{ secrets.MAIL_PASS }}
      MAIL_TO: ${{ secrets.MAIL_TO }}

    steps:
      - uses: actions/checkout@v4

      - name: read last video id
        id: last_id
        run: |
          if [ -f last_video.txt ]; then
            LAST=$(cat last_video.txt | tr -d '\n')
          else
            LAST=""
          fi
          echo "last_id=$LAST" >> $GITHUB_OUTPUT

      - name: restore last video
        uses: actions/cache@v3
        with:
          path: last_video.txt
          key: last-video-${{ steps.last_id.outputs.last_id }}
          restore-keys: |
            last-video-

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install feedparser

      - name: run monitor
        run: python check.py

      - name: read updated last video id
        id: new_last_id
        run: |
          if [ -f last_video.txt ]; then
            NEW=$(cat last_video.txt | tr -d '\n')
          else
            NEW=""
          fi
          echo "new_last_id=$NEW" >> $GITHUB_OUTPUT

      - name: save last video
        uses: actions/cache@v3
        with:
          path: last_video.txt
          key: last-video-${{ steps.new_last_id.outputs.new_last_id }}
          restore-keys: |
            last-video-