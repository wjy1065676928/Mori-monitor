name: youtube-monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MAIL_USER: ${{ secrets.MAIL_USER }}
      MAIL_PASS: ${{ secrets.MAIL_PASS }}
      MAIL_TO: ${{ secrets.MAIL_TO }}

    steps:
      - uses: actions/checkout@v4

      - name: restore last video
        uses: actions/cache@v3
        with:
          path: last_video.txt
          key: last-video
          restore-keys: |
            last-video-

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install feedparser

      - name: run monitor
        run: python check.py

      - name: save last video
        uses: actions/cache@v3
        with:
          path: last_video.txt
          key: last-video-${{ github.run_number }}
          restore-keys: |
            last-video-